# filament-calibrator configuration
# Copy to ./filament-calibrator.toml or ~/.config/filament-calibrator/config.toml

# Printer connection
printer-url = "http://192.168.1.100"
api-key = "your-prusalink-api-key"

# Slicer setup
# prusaslicer-path is only needed if PrusaSlicer is not on your PATH
# prusaslicer-path = "/usr/bin/prusa-slicer"
# config-ini = "/path/to/printer-profile.ini"

# Bed centre in mm (X,Y) — used to position the model on the print bed.
# Default is 125,105 (Prusa MK-series 250×210 mm bed).
# For Prusa MINI, use 90,90.
# bed-center = "125,105"

# Defaults
filament-type = "PLA"
output-dir = "./output"
