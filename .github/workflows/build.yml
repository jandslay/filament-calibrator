name: Build Standalone

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: FilamentCalibrator-linux-x86_64
          - os: ubuntu-24.04-arm
            artifact: FilamentCalibrator-linux-arm64
            use_conda: true
          - os: macos-latest
            artifact: FilamentCalibrator-macos-arm64
          - os: windows-latest
            artifact: FilamentCalibrator-windows-x86_64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        if: ${{ !matrix.use_conda }}
        with:
          python-version: "3.12"

      - name: Install dependencies (pip)
        if: ${{ !matrix.use_conda }}
        run: |
          pip install -e ".[gui]"
          pip install pyinstaller

      - name: Install Miniforge (ARM64)
        if: ${{ matrix.use_conda }}
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          python-version: "3.12"
          activate-environment: build
          channels: conda-forge

      - name: Install dependencies (conda + pip)
        if: ${{ matrix.use_conda }}
        shell: bash -el {0}
        run: |
          conda install -y cadquery
          pip install "ezdxf>=1.0,<1.4"
          pip install -e ".[gui]"
          pip install pyinstaller

      - name: Build with PyInstaller
        if: ${{ !matrix.use_conda }}
        working-directory: pyinstaller
        run: pyinstaller filament-calibrator.spec

      - name: Build with PyInstaller (conda)
        if: ${{ matrix.use_conda }}
        shell: bash -el {0}
        working-directory: pyinstaller
        run: pyinstaller filament-calibrator.spec

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd pyinstaller/dist
          tar -czf ${{ matrix.artifact }}.tar.gz FilamentCalibrator/

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path pyinstaller\dist\FilamentCalibrator\* `
            -DestinationPath pyinstaller\dist\${{ matrix.artifact }}.zip

      - name: Upload to Release (Linux/macOS)
        if: runner.os != 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: pyinstaller/dist/${{ matrix.artifact }}.tar.gz

      - name: Upload to Release (Windows)
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: pyinstaller/dist/${{ matrix.artifact }}.zip
